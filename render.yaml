# Render blueprint for Laurel (FastAPI + SSE).
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: laurel
    runtime: python
    plan: free            # bump to "starter" to avoid cold-start spin-down
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: ANTHROPIC_API_KEY   # set the value in the Render dashboard (kept secret)
        sync: false
      - key: BRAVE_API_KEY       # optional — official web search; omit to use the local fallback
        sync: false
